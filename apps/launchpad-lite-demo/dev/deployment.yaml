apiVersion: apps/v1
kind: Deployment
metadata:
  name: tekton-hello
  labels:
    app.kubernetes.io/name: tekton-hello
    app.kubernetes.io/part-of: launchpad-lite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tekton-hello
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tekton-hello
    spec:
      containers:
        - name: tekton-hello
          image: docker.io/chrisvon7/tekton-hello:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
